name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate: no release ships without green tests. Runs on windows-latest (not
  # ubuntu) so cargo test compiles the SAME target the release build uses —
  # find_system_python()/detect_gpu() behave differently per OS, and Linux
  # would need extra webkit2gtk system packages just to compile the crate.
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python test dependencies
        # Mirrors ci.yml (see its comment): test_vision_helpers.py imports
        # vision.py, which needs torch/ultralytics at module level. CPU
        # wheel index — this gate never touches a GPU. shell: bash so the
        # line continuations work the same as on ci.yml's ubuntu runner
        # (windows-latest defaults `run:` to PowerShell otherwise).
        shell: bash
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy opencv-contrib-python fast-alpr onnxruntime pyyaml \
                      ultralytics tqdm ftfy regex lap

      - name: Run Python unit tests
        shell: bash
        run: python -m unittest discover tests -v

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './visionx-app/src-tauri -> target'

      - name: Run Rust tests
        working-directory: visionx-app/src-tauri
        run: cargo test

  release:
    needs: test
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

 # NOTE: no manual resource-copy step — src-tauri/build.rs syncs every
      # bundled script/config from the repo root at build time (single
      # source of truth; a stale manual list here shipped a 2-file bundle
      # once and rolled back deployed scripts another time).

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: visionx-app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './visionx-app/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: visionx-app
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: visionx-app
          tagName: ${{ github.ref_name }}
          releaseName: 'VisionX ${{ github.ref_name }}'
          releaseBody: |
            ## VisionX ${{ github.ref_name }}

            ### Installation
            - Download the `.exe` installer for Windows (~15 MB)
            - On first launch, the app will download required AI components (~1-2.5 GB)

            ### Features
            - NVIDIA GPU auto-detection with CUDA acceleration
            - CPU fallback for systems without NVIDIA GPU
            - Auto-update support

            ### First Launch
            The app will automatically download:
            - Python runtime
            - PyTorch (with CUDA if NVIDIA GPU detected)
            - AI libraries and model
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: pnpm tauri
          args: --bundles nsis
