name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            name: macOS-arm64
            target_triple: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            name: Windows-x64
            target_triple: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
            target_triple: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies and PyInstaller
        shell: bash
        run: |
          # Linux: CPU-only PyTorch (avoids 4GB+ binary limit with CUDA)
          # Windows/macOS: full PyTorch (CUDA for NVIDIA, MPS for Apple Silicon)
          if [ "$RUNNER_OS" == "Linux" ]; then
            pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          fi
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        shell: bash
        run: |
          SEP=":"
          if [ "$RUNNER_OS" == "Windows" ]; then SEP=";"; fi
          pyinstaller --onefile --name vision vision.py \
            --hidden-import report \
            --add-data "report.py${SEP}."

      - name: Place sidecar binary
        shell: bash
        run: |
          mkdir -p visionx-app/src-tauri/binaries
          EXT=""
          if [ "$RUNNER_OS" == "Windows" ]; then EXT=".exe"; fi
          cp "dist/vision${EXT}" \
             "visionx-app/src-tauri/binaries/vision-${{ matrix.target_triple }}${EXT}"

      - name: Place resources and download default model
        shell: bash
        run: |
          mkdir -p visionx-app/src-tauri/resources/models
          cp config.yaml tracker.yaml visionx-app/src-tauri/resources/
          curl -L -o visionx-app/src-tauri/resources/models/yoloe-26x-seg.pt \
            "https://github.com/ultralytics/assets/releases/download/v8.3.0/yoloe-26x-seg.pt"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: visionx-app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './visionx-app/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: visionx-app
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: visionx-app
          tagName: ${{ github.ref_name }}
          releaseName: 'VisionX ${{ github.ref_name }}'
          releaseBody: |
            ## VisionX ${{ github.ref_name }}

            Download the installer for your platform below.

            ### Installation
            - **macOS (Apple Silicon)**: Download the `.dmg` file
            - **Windows**: Download the `.exe` or `.msi` installer
            - **Linux**: Download the `.AppImage` or `.deb` file

            ### Auto-Update
            - Windows & Linux: The app will notify you when updates are available
            - macOS: Use "Check for updates" button in the app

            ### Bundled Model
            - Default: yoloe-26x-seg.pt (XLarge, highest accuracy)
            - Other models can be selected in settings and will be downloaded automatically
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
