name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Place resource files
        shell: bash
        run: |
          mkdir -p visionx-app/src-tauri/resources/scripts
          cp vision.py visionx-app/src-tauri/resources/scripts/
          cp report.py visionx-app/src-tauri/resources/scripts/
          cp config.yaml visionx-app/src-tauri/resources/
          cp tracker.yaml visionx-app/src-tauri/resources/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: visionx-app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './visionx-app/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: visionx-app
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: visionx-app
          tagName: ${{ github.ref_name }}
          releaseName: 'VisionX ${{ github.ref_name }}'
          releaseBody: |
            ## VisionX ${{ github.ref_name }}

            ### Installation
            - Download the `.exe` installer for Windows (~15 MB)
            - On first launch, the app will download required AI components (~1-2.5 GB)

            ### Features
            - NVIDIA GPU auto-detection with CUDA acceleration
            - CPU fallback for systems without NVIDIA GPU
            - Auto-update support

            ### First Launch
            The app will automatically download:
            - Python runtime
            - PyTorch (with CUDA if NVIDIA GPU detected)
            - AI libraries and model
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: pnpm tauri
          args: --bundles nsis,updater
