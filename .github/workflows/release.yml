name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies (CUDA 12.4)
        shell: bash
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu124
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar (onedir for CUDA libs)
        shell: bash
        run: |
          pyinstaller --onedir --name vision vision.py \
            --hidden-import report \
            --hidden-import tqdm \
            --hidden-import yaml \
            --hidden-import clip \
            --hidden-import ftfy \
            --hidden-import regex \
            --hidden-import ultralytics \
            --collect-all ultralytics \
            --collect-all clip \
            --add-data "report.py;."

      - name: Place sidecar and CUDA libs
        shell: bash
        run: |
          mkdir -p visionx-app/src-tauri/binaries
          cp "dist/vision/vision.exe" \
             "visionx-app/src-tauri/binaries/vision-x86_64-pc-windows-msvc.exe"
          cp -r "dist/vision/_internal" "visionx-app/src-tauri/resources/_internal"

      - name: Place resources and download default model
        shell: bash
        run: |
          mkdir -p visionx-app/src-tauri/resources/models
          cp config.yaml tracker.yaml visionx-app/src-tauri/resources/
          curl -L --fail -o visionx-app/src-tauri/resources/models/yoloe-26x-seg.pt \
            "https://github.com/ultralytics/assets/releases/download/v8.4.0/yoloe-26x-seg.pt"
          # Verify download integrity (must be >100MB)
          FILE_SIZE=$(wc -c < visionx-app/src-tauri/resources/models/yoloe-26x-seg.pt | tr -d ' ')
          echo "Model file size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 100000000 ]; then
            echo "ERROR: Model file too small (${FILE_SIZE} bytes). Download likely failed."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: visionx-app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './visionx-app/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: visionx-app
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: visionx-app
          tagName: ${{ github.ref_name }}
          releaseName: 'VisionX ${{ github.ref_name }}'
          releaseBody: |
            ## VisionX ${{ github.ref_name }}

            ### Installation
            - Download the `.exe` installer for Windows

            ### Auto-Update
            - The app will notify you when updates are available

            ### NVIDIA GPU Support
            - CUDA 12.4 included — NVIDIA GPUs are used automatically
            - Falls back to CPU if no NVIDIA GPU is detected

            ### Bundled Model
            - Default: yoloe-26x-seg.pt (XLarge, highest accuracy)
            - Other models can be selected in settings and will be downloaded automatically
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: pnpm tauri
          args: --bundles nsis
